<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Palace Hotel - Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkAuth(); applyTheme(); setMinDates(); populateRoomNumbers(); loadBookingForEdit();">

    <aside class="sidebar">
        <div class="brand">
            <img src="images/hotel logo1.png" alt="Hotel Logo" class="logo">
            <h2>Grand Palace Hotel</h2>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="rooms.html">Rooms</a>
            <a href="booking.html">Book Room</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="payment.html">Payment</a>
            <a href="profile.html">Profile</a>
            <a href="admin.html">Admin</a>
            <a href="reviews.html">Reviews</a>
            <a href="terms.html">Ts&amp;Cs</a>
            <button class="theme-toggle-btn" onclick="toggleTheme()">Light Mode</button>
            <button onclick="logout()">Logout</button>
        </nav>
    </aside>

    <main class="main">
        <section class="card">
            <h1>Book a Room</h1>

            <input type="hidden" id="editingBookingId">

            <label for="customerName">Full Name <span class="required">*</span></label>
            <input type="text" id="customerName" placeholder="Enter full name">

            <label for="customerEmail">Email Address <span class="required">*</span></label>
            <input type="email" id="customerEmail" placeholder="Enter email address">

            <label for="roomType">Room Type <span class="required">*</span></label>
            <select id="roomType" onchange="populateRoomNumbers(); calculatePrice();">
                <option value="">Select room type</option>
                <option value="Single">Single</option>
                <option value="Double">Double</option>
                <option value="Suite">Suite</option>
            </select>

            <label for="roomNumber">Room Number <span class="required">*</span></label>
            <select id="roomNumber" onchange="calculatePrice()">
                <option value="">Select room number</option>
            </select>

            <label for="checkInDate">Check-In Date <span class="required">*</span></label>
            <input type="date" id="checkInDate" onchange="calculatePrice()">

            <label for="checkOutDate">Check-Out Date <span class="required">*</span></label>
            <input type="date" id="checkOutDate" onchange="calculatePrice()">

            <label for="guests">Number of Guests <span class="required">*</span></label>
            <input type="number" id="guests" min="1" placeholder="Enter number of guests">

            <div class="price-box">
                <p><strong>Total Price:</strong> <span id="totalPrice">R0</span></p>
            </div>

            <div class="button-row">
                <button class="primary" onclick="saveBooking()">Save Booking</button>
                <button class="secondary" onclick="clearBookingForm()">Clear</button>
            </div>

            <p id="bookingMsg" class="message"></p>
        </section>

        <footer class="site-footer">
            <p>&copy; 2026 Grand Palace Hotel. All rights reserved.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
