<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Palace Hotel - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkAuth(); applyTheme(); renderBookings();">

    <aside class="sidebar">
        <div class="brand">
            <img src="images/hotel logo1.png" alt="Hotel Logo" class="logo">
            <h2>Grand Palace Hotel</h2>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="rooms.html">Rooms</a>
            <a href="booking.html">Book Room</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="payment.html">Payment</a>
            <a href="profile.html">Profile</a>
            <a href="admin.html">Admin</a>
            <a href="reviews.html">Reviews</a>
            <a href="terms.html">Ts&amp;Cs</a>
            <button class="theme-toggle-btn" onclick="toggleTheme()">Light Mode</button>
            <button onclick="logout()">Logout</button>
        </nav>
    </aside>

    <main class="main">
        <section class="card">
            <h1>Bookings Dashboard</h1>

            <div class="filter-grid">
                <input type="text" id="searchName" placeholder="Search by name" onkeyup="renderBookings()">
                <input type="date" id="searchDate" onchange="renderBookings()">
                <select id="searchRoomType" onchange="renderBookings()">
                    <option value="">All room types</option>
                    <option value="Single">Single</option>
                    <option value="Double">Double</option>
                    <option value="Suite">Suite</option>
                </select>
            </div>

            <div id="bookingsList" class="bookings-list"></div>
        </section>

        <footer class="site-footer">
            <p>&copy; 2026 Grand Palace Hotel. All rights reserved.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
