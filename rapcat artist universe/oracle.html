<section class="oracle-card">
<h2>Receive a message from the universe</h2>
<p>This gives fans and visitors a memorable experience instead of a boring 
page.</p>
<button id="oracleBtn">Reveal Message</button>
<div id="oracleMessage">The chamber is quiet...</div>
</section>
<section class="memory-card">
<h2>Leave a star message</h2>
<form id="starForm">
<input type="text" id="visitorName" placeholder="Your name" required>
<textarea id="visitorMessage" placeholder="Leave a message for the 
universe" required></textarea>
<button type="submit">Send to the stars</button>
</form>
<div id="memoryWall"></div>
</section>
